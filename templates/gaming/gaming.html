<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ TITLE }}</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Gaming fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Core palette — the app's theme fills these in */
            --main-color: {{ PRIMARY }};
            --accent-color: {{ ACCENT }};
            --secondary-accent: {{ SECONDARY }};
            --text-color: {{ TEXT }};
            --text-muted: color-mix(in srgb, var(--text-color) 72%, transparent 28%);
            --background-1: {{ BACKGROUND }};
            --background-2: color-mix(in srgb, var(--background-1) 85%, var(--main-color) 15%);
            --background-3: color-mix(in srgb, var(--background-1) 85%, var(--accent-color) 15%);
            --panel-bg: color-mix(in srgb, {{ SURFACE }} 55%, transparent 45%);
            --panel-bg-strong: color-mix(in srgb, {{ SURFACE }} 75%, transparent 25%);
            --panel-border: color-mix(in srgb, var(--main-color) 45%, transparent 55%);
            --grid-line: color-mix(in srgb, var(--main-color) 12%, transparent 88%);
            --scanline-color: rgba(0, 0, 0, .18);
            --shadow: rgba(0, 0, 0, .55);
            --glow-main: color-mix(in srgb, var(--main-color) 80%, white 20%);
            --glow-accent: color-mix(in srgb, var(--accent-color) 80%, white 20%);
            --hp-color: #4ade80;
            --xp-color: var(--accent-color);
            --bg-text-color: color-mix(in srgb, var(--main-color) 22%, transparent 78%);
            --start-glow: #ffb02e;
            --spider-thread: rgba(255, 255, 255, .85);
            /* Fonts */
            --font-pixel: 'Press Start 2P', monospace;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            min-height: 100%;
            overflow-x: hidden;
        }
        body {
            position: relative;
            min-height: 100vh;
            font-family: var(--font-body);
            color: var(--text-color);
            overflow-x: hidden;
            background:
                radial-gradient(ellipse at 20% 10%, var(--background-2), transparent 55%),
                radial-gradient(ellipse at 85% 85%, var(--background-3), transparent 55%),
                var(--background-1);
            display: flex;
            align-items: center;
            align-items: safe center;
            justify-content: center;
            padding: 56px 24px;
        }
        /* Retro grid floor */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, .9), transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, .9), transparent 75%);
            z-index: -3;
            pointer-events: none;
        }
        /* CRT scanlines */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(to bottom,
                    transparent 0px,
                    transparent 3px,
                    var(--scanline-color) 4px);
            opacity: .35;
            z-index: 50;
            pointer-events: none;
        }
        /* Background effects layer */
        .bg-effects {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .30;
            animation: ambientPulse 9s ease-in-out infinite alternate;
        }
        .ambient-glow.g1 {
            width: 480px;
            height: 480px;
            top: -12%;
            left: -10%;
            background: var(--main-color);
        }
        .ambient-glow.g2 {
            width: 540px;
            height: 540px;
            bottom: -18%;
            right: -12%;
            background: var(--accent-color);
            animation-delay: -4s;
        }
        @keyframes ambientPulse {
            from {
                opacity: .18;
                transform: scale(.95);
            }
            to {
                opacity: .38;
                transform: scale(1.1);
            }
        }
        /* Typed console text in the background */
        .bg-console {
            position: absolute;
            font-family: var(--font-pixel);
            font-size: clamp(.55rem, 1.2vw, .8rem);
            color: var(--bg-text-color);
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .bg-console::after {
            content: "▌";
            animation: cursorBlink 1s steps(1) infinite;
        }
        @keyframes cursorBlink {50% {opacity: 0;}}
        /* Floating PNG decorations */
        .float-png {
            position: absolute;
            width: var(--fsize, 48px);
            height: auto;
            opacity: var(--fopacity, .55);
            image-rendering: pixelated;
            filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent-color) 45%, transparent 55%));
            animation: floatDrift var(--fduration, 8s) ease-in-out infinite;
            animation-delay: var(--fdelay, 0s);
        }
        @keyframes floatDrift {
            0%,
            100% {transform: translateY(0) rotate(-4deg);}
            50% {transform: translateY(-22px) rotate(6deg);}
        }
        /* Twinkling pixel stars */
        .pixel-star {
            position: absolute;
            width: var(--ssize, 4px);
            height: var(--ssize, 4px);
            background: var(--accent-color);
            box-shadow: 0 0 8px 1px var(--glow-accent);
            animation: starTwinkle var(--sduration, 3s) ease-in-out infinite;
            animation-delay: var(--sdelay, 0s);
        }
        @keyframes starTwinkle {
            0%,
            100% {
                opacity: .1;
                transform: scale(.7);
            }
            50% {
                opacity: .9;
                transform: scale(1.3);
            }
        }
        /* Layout */
        .page-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1080px;
            display: flex;
            flex-direction: column;
            gap: 26px;
        }
        /* HUD top bar */
        .hud-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            font-family: var(--font-pixel);
            font-size: .6rem;
            color: var(--text-muted);
            padding: 14px 20px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 18px color-mix(in srgb, var(--main-color) 20%, transparent 80%);
        }
        .hud-lives {
            display: flex;
            gap: 8px;
            color: var(--secondary-accent);
            font-size: .8rem;
        }
        .hud-lives i {
            filter: drop-shadow(0 0 6px var(--secondary-accent));
            animation: heartBeat 1.6s ease-in-out infinite;
        }
        .hud-lives i:nth-child(2) {animation-delay: .2s;}
        .hud-lives i:nth-child(3) {animation-delay: .4s;}
        @keyframes heartBeat {
            0%,
            100% {transform: scale(1);}
            12% {transform: scale(1.25);}
            24% {transform: scale(1);}
        }
        .hud-score i {
            color: gold;
            margin-right: 6px;
        }
        /* Content grid */
        .content-grid {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            width: 100%;
        }
        /* Panel base */
        .game-panel {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow:
                0 10px 34px var(--shadow),
                0 0 22px color-mix(in srgb, var(--main-color) 16%, transparent 84%),
                inset 0 1px 0 rgba(255, 255, 255, .08);
            transition: box-shadow .4s ease, border-color .4s ease, transform .4s ease;
        }
        .game-panel:hover {
            border-color: color-mix(in srgb, var(--accent-color) 60%, var(--panel-border) 40%);
            box-shadow:
                0 14px 40px var(--shadow),
                0 0 34px color-mix(in srgb, var(--accent-color) 30%, transparent 70%),
                inset 0 1px 0 rgba(255, 255, 255, .12);
            transform: translateY(-4px);
        }
        /* corner brackets on panels */
        .game-panel::before, .game-panel::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            border-color: var(--accent-color);
            border-style: solid;
            opacity: .9;
        }
        .game-panel::before {
            top: -2px;
            left: -2px;
            border-width: 2px 0 0 2px;
            border-radius: 8px 0 0 0;
        }
        .game-panel::after {
            bottom: -2px;
            right: -2px;
            border-width: 0 2px 2px 0;
            border-radius: 0 0 8px 0;
        }
        /* Player card */
        .player-card {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 28px;
            text-align: center;
        }
        .avatar-wrap {
            position: relative;
            width: 100%;
            max-width: 300px;
        }
        .avatar-frame {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid color-mix(in srgb, var(--main-color) 70%, white 30%);
            box-shadow:
                0 0 18px color-mix(in srgb, var(--main-color) 45%, transparent 55%),
                0 10px 26px var(--shadow);
        }
        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .corner-png {
            position: absolute;
            width: 52px;
            height: auto;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 8px var(--secondary-accent));
            animation: heartBeat 1.8s ease-in-out infinite;
            z-index: 2;
        }
        .corner-png.heart {
            top: -22px;
            right: -20px;
        }
        .corner-png.star {
            bottom: -18px;
            left: -20px;
            filter: drop-shadow(0 0 8px var(--glow-accent));
            animation: floatDrift 5s ease-in-out infinite;
        }
        .corner-png.mail {
            top: -20px;
            right: -18px;
            filter: drop-shadow(0 0 8px var(--glow-accent));
            animation: floatDrift 6s ease-in-out infinite;
        }
        .corner-png.amongus {
            width: 100px;
            bottom: -24px;
            right: -45px;
            opacity: 0;
            filter: drop-shadow(0 0 8px var(--glow-main));
            animation: amongusPeek 8s ease-in-out infinite;
        }
        @keyframes amongusPeek {
            0% {
                opacity: 0;
                transform: scaleX(1);
            }
            8% {
                opacity: 1;
                transform: scaleX(1);
            }
            34% {
                opacity: 1;
                transform: scaleX(1);
            }
            38% {
                opacity: 1;
                transform: scaleX(-1);
            }
            56% {
                opacity: 1;
                transform: scaleX(-1);
            }
            66% {
                opacity: 0;
                transform: scaleX(-1);
            }
            100% {
                opacity: 0;
                transform: scaleX(-1);
            }
        }
        .player-tag {
            margin-top: 22px;
            font-family: var(--font-pixel);
            font-size: .55rem;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .player-name {
            margin-top: 10px;
            max-width: 100%;
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-color);
            overflow-wrap: anywhere;
            text-shadow: 0 0 12px color-mix(in srgb, var(--main-color) 60%, transparent 40%);
        }
        /* stat bars */
        .stat-bars {
            width: 100%;
            max-width: 300px;
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .stat-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-pixel);
            font-size: .5rem;
            color: var(--text-muted);
        }
        .stat-row i {
            width: 16px;
            text-align: center;
        }
        .stat-row .fa-heart {color: var(--hp-color);}
        .stat-row .fa-bolt {color: var(--xp-color);}
        .stat-track {
            flex: 1;
            height: 10px;
            border-radius: 5px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            border-radius: 5px;
            width: var(--fill, 80%);
            background: linear-gradient(90deg,
                    color-mix(in srgb, var(--fill-color, var(--hp-color)) 70%, black 30%),
                    var(--fill-color, var(--hp-color)));
            box-shadow: 0 0 10px var(--fill-color, var(--hp-color));
            animation: fillUp 1.6s cubic-bezier(.2, .8, .2, 1) both;
        }
        .stat-fill.hp {
            --fill: 100%;
            --fill-color: var(--hp-color);
        }
        .stat-fill.xp {
            --fill: 86%;
            --fill-color: var(--xp-color);
            animation-delay: .3s;
            box-shadow:
                0 0 10px var(--xp-color),
                0 0 22px color-mix(in srgb, var(--xp-color) 60%, transparent 40%);
        }
        @keyframes fillUp {from {width: 0;}}
        /* Main column */
        .content-main {
            flex: 1.35;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
        }
        /* Title panel */
        .title-panel {
            padding: 34px 38px;
            text-align: center;
        }
        .level-up {
            font-family: var(--font-pixel);
            font-size: .6rem;
            letter-spacing: 3px;
            color: var(--secondary-accent);
            text-shadow: 0 0 10px var(--secondary-accent);
            margin-bottom: 18px;
            animation: blinkSoft 2.2s steps(2) infinite;
        }
        @keyframes blinkSoft {50% {opacity: .35;}}
        .neon-title {
            position: relative;
            display: inline-block;
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 3.4vw, 2.8rem);
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.3;
            text-transform: uppercase;
            color: var(--text-color);
            overflow-wrap: anywhere;
            animation: neonPulse 2.8s ease-in-out infinite;
        }
        @keyframes neonPulse {
            0%,
            100% {
                text-shadow:
                    0 0 6px var(--glow-main),
                    0 0 16px var(--main-color),
                    0 0 38px color-mix(in srgb, var(--main-color) 60%, transparent 40%);
            }
            50% {
                text-shadow:
                    0 0 10px var(--glow-main),
                    0 0 30px var(--main-color),
                    0 0 64px var(--main-color),
                    0 0 90px color-mix(in srgb, var(--accent-color) 55%, transparent 45%);
            }
        }
        .neon-title::before, .neon-title::after {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            overflow: hidden;
            opacity: .85;
            pointer-events: none;
        }
        .neon-title::before {
            color: var(--accent-color);
            animation: glitchShift 3.5s steps(2, jump-none) infinite;
            clip-path: inset(15% 0 60% 0);
        }
        .neon-title::after {
            color: var(--secondary-accent);
            animation: glitchShift 3.5s steps(2, jump-none) infinite reverse;
            clip-path: inset(65% 0 8% 0);
        }
        @keyframes glitchShift {
            0%, 86%, 100% {
                transform: translate(0, 0);
                opacity: 0;
            }
            88% {
                transform: translate(-4px, 2px);
                opacity: .8;
            }
            90% {
                transform: translate(4px, -1px);
                opacity: .8;
            }
            92% {
                transform: translate(-2px, -2px);
                opacity: .6;
            }
            94% {
                transform: translate(3px, 1px);
                opacity: .7;
            }
            96% {
                transform: translate(0, 0);
                opacity: 0;
            }
        }
        /* Message panel */
        .message-panel {padding: 28px 32px;}
        .quest-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-pixel);
            font-size: .55rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed color-mix(in srgb, var(--accent-color) 40%, transparent 60%);
        }
        .quest-header i {filter: drop-shadow(0 0 6px var(--glow-accent));}
        .message-panel p {
            font-size: 1.12rem;
            font-weight: 500;
            line-height: 1.8;
            color: var(--text-muted);
            letter-spacing: .3px;
            overflow-wrap: anywhere;
        }
        /* Date panel */
        .date-panel {
            align-self: center;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 30px;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1.5px;
        }
        .date-panel i {
            color: var(--accent-color);
            filter: drop-shadow(0 0 8px var(--glow-accent));
        }
        /* Press start footer (PNG button) */
        .press-start {
            display: flex;
            justify-content: center;
        }
        .press-start img {
            width: min(230px, 58vw);
            height: auto;
            image-rendering: pixelated;
            animation:
                startFloat 4s ease-in-out infinite,
                startGlow 2.2s ease-in-out infinite;
        }
        @keyframes startFloat {
            0%,
            100% {transform: translateY(0);}
            50% {transform: translateY(-12px);}
        }
        @keyframes startGlow {
            0%, 100% {
                filter:
                    drop-shadow(0 0 5px color-mix(in srgb, var(--start-glow) 70%, transparent 30%))
                    drop-shadow(0 0 14px color-mix(in srgb, var(--start-glow) 40%, transparent 60%));
            }
            50% {
                filter:
                    drop-shadow(0 0 10px var(--start-glow))
                    drop-shadow(0 0 30px color-mix(in srgb, var(--start-glow) 75%, transparent 25%));
            }
        }
        /* Minecraft spider dropping from the ceiling */
        .spider-rig {
            position: fixed;
            top: 0;
            left: 72%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transform: translateY(-105%);
            animation: spiderDrop 11s ease-in-out infinite;
            animation-delay: 1.5s;
        }
        .spider-thread {
            width: 2px;
            height: 200px;
            background: linear-gradient(to bottom, transparent, var(--spider-thread));
            box-shadow: 0 0 6px rgba(255, 255, 255, .3);
        }
        .spider-rig img {
            width: 96px;
            height: auto;
            image-rendering: pixelated;
            margin-top: -48px;
            filter: drop-shadow(0 6px 12px var(--shadow));
        }
        @keyframes spiderDrop {
            0% {transform: translateY(-105%);}
            32% {transform: translateY(0);}
            50% {transform: translateY(0);}
            80% {transform: translateY(-105%);}
            100% {transform: translateY(-105%);}
        }
        /* Screen-corner floaters (glider / battle bus) */
        .screen-float {
            position: fixed;
            z-index: 5;
            pointer-events: none;
            animation: driftX var(--dx-duration, 7s) ease-in-out infinite alternate;
        }
        .screen-float img {
            display: block;
            width: var(--fw, 70px);
            height: auto;
            filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent-color) 35%, transparent 65%));
            animation: driftY var(--dy-duration, 4.6s) ease-in-out infinite alternate;
        }
        @keyframes driftX {
            from {transform: translateX(calc(var(--dx, 26px) * -1)) rotate(-2deg);}
            to {transform: translateX(var(--dx, 26px)) rotate(2deg);}
        }
        @keyframes driftY {
            from {transform: translateY(calc(var(--dy, 18px) * -1));}
            to {transform: translateY(var(--dy, 18px));}
        }
        .screen-float.glider {
            top: 6%;
            right: 4%;
            --fw: 72px;
            --dx: 30px;
            --dy: 22px;
            --dx-duration: 7.5s;
            --dy-duration: 4.8s;
        }
        .screen-float.bus {
            bottom: 5%;
            left: 3%;
            --fw: 84px;
            --dx: 26px;
            --dy: 18px;
            --dx-duration: 8.5s;
            --dy-duration: 5.6s;
        }
        /* Responsive */
        @media (max-width: 920px) {
            .content-grid {
                flex-direction: column;
                align-items: center;
            }
            .player-card, .content-main {
                width: 100%;
                max-width: 480px;
            }
            .neon-title {font-size: clamp(1.4rem, 5.4vw, 2.2rem);}
        }
        @media (max-width: 520px) {
            body {padding: 36px 14px;}
            .hud-bar {
                justify-content: center;
                font-size: .5rem;
            }
            .title-panel {padding: 26px 20px;}
            .message-panel {padding: 22px 18px;}
            .message-panel p {font-size: 1rem;}
            .avatar-wrap {max-width: 240px;}
            .corner-png {width: 40px;}
            .corner-png.amongus {width: 46px;}
            .float-png {--fopacity: .3;}
            .spider-rig img {
                width: 62px;
                margin-top: -31px;
            }
            .spider-thread {height: 130px;}
            .screen-float.glider {--fw: 52px;}
            .screen-float.bus {--fw: 60px;}
        }
        @media (prefers-reduced-motion: reduce) {*, *::before, *::after {animation: none !important;}}
    </style>
</head>
<body>
    <!-- Background layer -->
    <div class="bg-effects" id="bgEffects">
        <div class="ambient-glow g1"></div>
        <div class="ambient-glow g2"></div>
        <!-- typed console lines (text filled in by JS typing animation) -->
        <div class="bg-console" style="top: 12%; left: 5%;" data-text="> PLAYER_2 JOINED THE PARTY..."></div>
        <div class="bg-console" style="top: 30%; right: 6%;" data-text="> ACHIEVEMENT UNLOCKED: ANOTHER YEAR"></div>
        <div class="bg-console" style="bottom: 24%; left: 8%;" data-text="> LOADING CAKE.EXE ██████ 100%"></div>
        <div class="bg-console" style="bottom: 10%; right: 10%;" data-text="> +9999 XP GAINED"></div>
        <img class="float-png" src="../../assets/images/Pixelated Casette.png" alt="" style="top: 18%; left: 12%; --fsize: 54px; --fduration: 9s;">
        <img class="float-png" src="../../assets/images/Pixelated Heart.png" alt="" style="top: 8%; right: 18%; --fsize: 40px; --fduration: 7s; --fdelay: 1.2s;">
        <img class="float-png" src="../../assets/images/Pixelated Coin.png" alt="" style="top: 55%; left: 4%; --fsize: 36px; --fduration: 6s; --fdelay: .6s;">
        <img class="float-png" src="../../assets/images/Pixelated Overwatch Char 1.png" alt="" style="bottom: 14%; right: 5%; --fsize: 50px; --fduration: 8s; --fdelay: 2s;">
        <img class="float-png" src="../../assets/images/Pixelated star.png" alt="" style="bottom: 32%; left: 20%; --fsize: 32px; --fduration: 10s; --fdelay: 1.6s;">
        <img class="float-png" src="../../assets/images/Minecraft Sword.png" alt="" style="top: 40%; right: 12%; --fsize: 44px; --fduration: 7.5s; --fdelay: .9s;">
    </div>
    <!-- Screen decorations -->
    <div class="spider-rig">
        <div class="spider-thread"></div>
        <img src="../../assets/images/Minecraft Spider.png" alt="">
    </div>
    <div class="screen-float glider">
        <img src="../../assets/images/Fortnite Glider.png" alt="">
    </div>
    <div class="screen-float bus">
        <img src="../../assets/images/battle bus.png" alt="">
    </div>
    <main class="page-wrap">
        <!-- HUD bar -->
        <header class="hud-bar">
            <span class="hud-lives">
                <i class="fa-solid fa-heart"></i>
                <i class="fa-solid fa-heart"></i>
                <i class="fa-solid fa-heart"></i>
            </span>
            <span>LEVEL UP DAY</span>
            <span class="hud-score"><i class="fa-solid fa-coins"></i>SCORE 999999</span>
        </header>
        <div class="content-grid">
            <!-- Player card -->
            <section class="game-panel player-card">
                <div class="avatar-wrap">
                    <img class="corner-png heart" src="../../assets/images/Pixelated Heart.png" alt="">
                    <img class="corner-png star" src="../../assets/images/Pixelated star.png" alt="">
                    <div class="avatar-frame">
                        <img src="{{ IMAGE }}" alt="{{ NAME }}">
                    </div>
                </div>
                <div class="player-tag"><i class="fa-solid fa-gamepad"></i> Player 1</div>
                <h2 class="player-name">{{ NAME }}</h2>
                <div class="stat-bars">
                    <div class="stat-row">
                        <i class="fa-solid fa-bolt"></i>
                        <span>XP</span>
                        <div class="stat-track">
                            <div class="stat-fill xp"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <i class="fa-solid fa-heart"></i>
                        <span>HP</span>
                        <div class="stat-track">
                            <div class="stat-fill hp"></div>
                        </div>
                    </div>
                </div>
                <img class="corner-png amongus" src="../../assets/images/Pixelated amongus.png" alt="">
            </section>
            <!-- Main column  -->
            <div class="content-main">
                <section class="game-panel title-panel">
                    <div class="level-up"><i class="fa-solid fa-arrow-up"></i> LEVEL UP!</div>
                    <h1 class="neon-title" data-text="Happy Birthday {{ NAME }}">Happy Birthday {{ NAME }}</h1>
                </section>
                <section class="game-panel message-panel">
                    <img class="corner-png mail" src="../../assets/images/Pixelated Mail.png" alt="">
                    <div class="quest-header">
                        <i class="fa-solid fa-scroll"></i>
                        <span>Incoming Message</span>
                    </div>
                    <p>{{ MESSAGE }}</p>
                </section>
                <section class="game-panel date-panel">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>{{ DATE }}</span>
                </section>
            </div>
        </div>
        <footer class="press-start">
            <img src="../../assets/images/START Button.png" alt="Press start to celebrate">
        </footer>
    </main>
    <script>
        (function () {
            const rand = (min, max) => min + Math.random() * (max - min);
            const bg = document.getElementById('bgEffects');
            /* Twinkling pixel stars */
            const starCount = 34;
            for (let i = 0; i < starCount; i++) {
                const s = document.createElement('div');
                s.className = 'pixel-star';
                s.style.top = rand(0, 100).toFixed(1) + '%';
                s.style.left = rand(0, 100).toFixed(1) + '%';
                s.style.setProperty('--ssize', rand(2, 5).toFixed(1) + 'px');
                s.style.setProperty('--sduration', rand(2, 5).toFixed(1) + 's');
                s.style.setProperty('--sdelay', rand(0, 5).toFixed(1) + 's');
                bg.appendChild(s);
            }
            /* Typing animation for background console lines */
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            document.querySelectorAll('.bg-console').forEach((el, idx) => {
                const fullText = el.dataset.text;
                if (reduceMotion) {
                    el.textContent = fullText;
                    return;
                }
                const typeSpeed = 70;
                const holdTime = 2600;
                const startDelay = idx * 900;
                function typeLoop() {
                    let i = 0;
                    el.textContent = '';
                    const timer = setInterval(() => {
                        el.textContent = fullText.slice(0, ++i);
                        if (i >= fullText.length) {
                            clearInterval(timer);
                            setTimeout(typeLoop, holdTime);
                        }
                    }, typeSpeed);
                } setTimeout(typeLoop, startDelay);
            });
            /* Occasional random glitch jolt on the title */
            const title = document.querySelector('.neon-title');
            if (title && !reduceMotion) {
                setInterval(() => {
                    if (Math.random() < 0.4) {
                        title.style.transform = `translate(${rand(-3, 3).toFixed(1)}px, ${rand(-2, 2).toFixed(1)}px) skewX(${rand(-2, 2).toFixed(1)}deg)`;
                        setTimeout(() => { title.style.transform = ''; }, 120);
                    }
                }, 2200);
            }
            /* Random HP/XP bar fluctuation */
            if (!reduceMotion) {
                document.querySelectorAll('.stat-fill').forEach(bar => {
                    const MIN = 25, MAX = 100;
                    function wander() {
                        const target = rand(MIN, MAX);
                        const duration = rand(1.2, 2.6);
                        bar.style.transition = 'width ' + duration.toFixed(2) + 's ease-in-out';
                        bar.style.width = target.toFixed(1) + '%';
                        setTimeout(wander, duration * 1000 + rand(500, 1800));
                    }
                    setTimeout(() => {
                        bar.style.width = getComputedStyle(bar).width;
                        bar.style.animation = 'none';
                        wander();
                    }, 2200 + rand(0, 900));
                });
            }
            /* Hide decorative PNGs whose images aren't added yet */
            document.querySelectorAll('.float-png, .corner-png, .screen-float img, .spider-rig img, .press-start img').forEach(img => {
                img.addEventListener('error', () => { img.style.display = 'none'; });
            });
        })();
    </script>
</body>
</html>
